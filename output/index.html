<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TT小程序IAP数据</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
  onerror="this.onerror=null;this.src='https://unpkg.com/chart.js@4.4.7/dist/chart.umd.min.js';"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"
  onerror="this.onerror=null;this.src='https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment@2.30.1/min/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment@2.30.1/locale/zh-cn.js"></script>
<script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f14; --bg2: #14141e; --surface: #1a1a24; --border: #2a2a3a;
  --text: #e0e0e8; --text2: #8888a0; --text3: #555570; --accent: #6c5ce7;
  --green: #00b894; --red: #e17055; --gold: #fdcb6e;
  --accent2: #a29bfe;
}
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.role-badge { display: flex; align-items: center; gap: 10px; }
.role-badge select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 14px; cursor: pointer; outline: none; }
.role-badge select:focus { border-color: var(--accent); }
.role-indicator { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.role-indicator.ads { background: rgba(108,92,231,0.15); color: var(--accent2); }
.role-indicator.product { background: rgba(0,184,148,0.15); color: var(--green); }

/* Nav */
.nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 24px; gap: 0; }
.nav button { background: none; border: none; color: var(--text2); font-size: 14px; padding: 14px 24px; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
.nav button:hover { color: var(--text); }
.nav button.active { color: var(--accent2); border-bottom-color: var(--accent); font-weight: 600; }

/* Main content */
.main { max-width: 1400px; margin: 0 auto; padding: 24px; }
.page { display: none; }
.page.active { display: block; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.card h3 { font-size: 16px; margin-bottom: 16px; color: var(--accent2); }
.card h3 i { margin-right: 6px; }

/* Forms */
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
.form-group input, .form-group select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-group input::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
.form-group input::-webkit-datetime-edit { color: var(--text); }
.form-section-title { grid-column: 1/-1; font-size: 13px; color: var(--gold); font-weight: 600; margin-top: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

/* Buttons */
.btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #5b4bd5; }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover { background: #00a381; }
.btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
.btn-danger:hover { background: rgba(225,112,85,0.1); }
.btn-outline { background: transparent; color: var(--accent2); border: 1px solid var(--accent); }
.btn-outline:hover { background: rgba(108,92,231,0.1); }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.form-actions { margin-top: 16px; display: flex; gap: 10px; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--bg); color: var(--text2); font-weight: 600; padding: 10px 12px; text-align: left; white-space: nowrap; border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
tr:hover td { background: rgba(108,92,231,0.05); }
.num { text-align: right; font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
.roi-positive { color: var(--green); font-weight: 600; }
.roi-negative { color: var(--red); font-weight: 600; }

/* Stats cards */
.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.stat-card .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.stat-card .stat-value { font-size: 22px; font-weight: 700; }
.stat-card .stat-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Charts */
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.chart-row .card { margin-bottom: 0; display: flex; flex-direction: column; }
.chart-row .card h3 { font-size: 14px; margin-bottom: 12px; color: var(--text1); flex-shrink: 0; }
.chart-row .card canvas { flex: 1; max-height: 260px !important; }
@media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab-btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; background: var(--bg); color: var(--text2); border: 1px solid var(--border); cursor: pointer; }
.tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Date range */
.date-range { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.date-range .range-pick { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; cursor: pointer; min-width: 220px; text-align: left; }
.date-range .range-pick:hover { border-color: var(--accent); }
.date-range .range-pick:focus { border-color: var(--accent); }

/* daterangepicker dark theme overrides */
.daterangepicker {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  font-family: inherit; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 9999;
}
.daterangepicker:before, .daterangepicker:after { display: none; }
.daterangepicker .drp-calendar { background: var(--surface); }
.daterangepicker .drp-calendar.left, .daterangepicker .drp-calendar.right { background: var(--surface); padding: 8px 12px; }
.daterangepicker .calendar-table { background: transparent; border: none; }
.daterangepicker .calendar-table th { color: var(--text2); font-weight: 500; }
.daterangepicker .calendar-table td { color: var(--text); border-radius: 6px; }
.daterangepicker .calendar-table td.off,
.daterangepicker .calendar-table td.off.in-range,
.daterangepicker .calendar-table td.off.start-date,
.daterangepicker .calendar-table td.off.end-date { background: transparent; color: var(--text3); }
.daterangepicker .calendar-table td.available:hover { background: rgba(108,92,231,0.2); color: var(--text); }
.daterangepicker .calendar-table td.in-range { background: rgba(108,92,231,0.15); color: var(--text); }
.daterangepicker .calendar-table td.active,
.daterangepicker .calendar-table td.active:hover { background: var(--accent) !important; color: #fff; }
.daterangepicker .calendar-table .next span,
.daterangepicker .calendar-table .prev span { border-color: var(--text2); }
.daterangepicker .calendar-table .next:hover span,
.daterangepicker .calendar-table .prev:hover span { border-color: var(--accent); }
.daterangepicker .drp-buttons { border-top-color: var(--border); padding: 8px 12px; }
.daterangepicker .drp-buttons .btn { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; padding: 6px 16px; }
.daterangepicker .drp-buttons .btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.daterangepicker .drp-buttons .applyBtn { background: var(--accent); color: #fff; border-color: var(--accent); }
.daterangepicker .drp-buttons .cancelBtn { background: transparent; color: var(--text2); border-color: var(--border); }
.daterangepicker .ranges { background: var(--bg); }
.daterangepicker .ranges li { color: var(--text2); font-size: 13px; padding: 6px 12px; border-radius: 6px; }
.daterangepicker .ranges li:hover { background: rgba(108,92,231,0.15); color: var(--text); }
.daterangepicker .ranges li.active { background: var(--accent); color: #fff; }
.daterangepicker select.monthselect,
.daterangepicker select.yearselect { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; }
.daterangepicker select.hourselect,
.daterangepicker select.minuteselect,
.daterangepicker select.ampmselect { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; }
.daterangepicker .drp-calendar.left { border-right: 1px solid var(--border); }
.daterangepicker .calendar-table thead tr:first-child th { color: var(--text); font-weight: 600; background: transparent; }

/* Row actions */
.row-actions { display: flex; gap: 6px; }
.action-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: .15s; }
.action-btn.edit:hover { background: rgba(108,92,231,0.15); color: var(--accent2); }
.action-btn.del:hover { background: rgba(225,112,85,0.15); color: var(--red); }

/* Tooltip */
.tooltip { position: relative; cursor: help; border-bottom: 1px dotted var(--text2); }
.tooltip:hover::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 10; pointer-events: none; }

.roi-bar { display: inline-block; height: 6px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }
.total-row td { font-weight: 700; background: rgba(108,92,231,0.08) !important; }

/* Dimension filter */
.dim-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.dim-filter select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; cursor: pointer; }
.dim-filter select:focus { border-color: var(--accent); }
.dim-filter label { font-size: 12px; color: var(--text2); }

/* Toast */
.toast { position: fixed; top: 20px; right: 20px; background: var(--green); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 999; animation: fadeIn .3s, fadeOut .3s 2.5s forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }
@keyframes fadeOut { to { opacity: 0; } }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 500px; }
.modal h3 { margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
</style>

<body>

<!-- Header -->
<header class="header">
  <h1>TT投放数据</h1>
  <div class="role-badge">
    <span id="roleIndicator" class="role-indicator product">产品</span>
    <select id="roleSelect" onchange="switchRole()">
      <option value="product">产品</option>
      <option value="ads">投放师</option>
    </select>
  </div>
</header>

<!-- Navigation -->
<nav class="nav">
  <button class="active" data-page="entry" onclick="switchPage('entry')">数据录入</button>
  <button data-page="history" onclick="switchPage('history')">历史记录</button>
  <button data-page="dashboard" onclick="switchPage('dashboard')">数据看板</button>
</nav>

<!-- Toast Container -->
<div id="toast" class="toast" style="display:none;"></div>

<div class="main">
<!-- ==================== Page: Entry ==================== -->
<div id="page-entry" class="page active">

  <!-- Ad Entry Card -->
  <div id="card-ads-entry" class="card" style="display:none;">
    <h3>投放数据录入</h3>
    <div class="form-grid" id="adEntryForm">
      <div class="form-group">
        <label>日期 *</label>
        <input type="date" id="adDate" onclick="this.showPicker()">
      </div>
      <div class="form-group">
        <label>包名 *</label>
        <select id="adPkg">
          <option value="">请选择包名</option>
          <option value="DramaBox">DramaBox</option>
          <option value="DramaSnacker">DramaSnacker</option>
          <option value="MiniDramaBox">MiniDramaBox</option>
          <option value="DramaNest">DramaNest</option>
          <option value="DramaBoost">DramaBoost</option>
          <option value="DramaDash">DramaDash</option>
        </select>
      </div>
      <div class="form-group">
        <label>投放组 *</label>
        <select id="adGroup">
          <option value="">请选择投放组</option>
          <option value="DB投放组">DB投放组</option>
          <option value="免费投放三组">免费投放三组</option>
          <option value="快应用三组">快应用三组</option>
        </select>
      </div>
      <div class="form-group">
        <label>面板 *</label>
        <select id="adPanel">
          <option value="">请选择面板</option>
          <option value="混合beans">混合beans</option>
          <option value="混合">混合</option>
          <option value="纯订阅">纯订阅</option>
        </select>
      </div>
      <div class="form-group">
        <label>消耗 ($)</label>
        <input type="number" id="adSpend" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>消耗-扣除空耗 ($)</label>
        <input type="number" id="adSpendClean" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>收入-投放口径 ($)</label>
        <input type="number" id="adRevenue" placeholder="0.00" step="0.01" min="0">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitAdData()">提交投放数据</button>
      <button class="btn btn-outline btn-sm" onclick="clearAdForm()">清空表单</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click(); showImportHint('ads')" style="margin-left:auto;">📥 导入Excel</button>
      <button class="btn btn-outline btn-sm" onclick="downloadTemplate('ads')">📥 下载投放模板</button>
    </div>
  </div>

  <!-- Revenue Entry Card -->
  <div id="card-rev-entry" class="card" style="display:none;">
    <h3>收入数据录入</h3>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchRevTab('day0')">当日</button>
      <button class="tab-btn" onclick="switchRevTab('day8')">8日</button>
      <button class="tab-btn" onclick="switchRevTab('day14')">14日</button>
      <button class="tab-btn" onclick="switchRevTab('day30')">30日</button>
      <button class="tab-btn" onclick="switchRevTab('day45')">45日</button>
    </div>
    <div class="form-grid" id="revEntryForm">
      <div class="form-section-title">投放日期</div>
      <div class="form-group">
        <label>投放日期 *</label>
        <input type="date" id="revDate" onclick="this.showPicker()">
      </div>
      <div class="form-section-title" style="margin-top:0;">收入项目 ($)</div>
      <div class="form-group" id="revGroupCoin">
        <label>金币收入（去通道）</label>
        <input type="number" id="revCoin" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group" id="revGroupFirstSub">
        <label>会员首订（去通道）</label>
        <input type="number" id="revFirstSub" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group" id="revGroupRenewSub">
        <label id="revRenewSubLabel">会员续订（去通道）</label>
        <input type="number" id="revRenewSub" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group" id="revGroupCoinRenew">
        <label id="revRenewLabel">8日内金币续订（去通道）</label>
        <input type="number" id="revCoinRenew" placeholder="0.00" step="0.01" min="0">
      </div>
      <input type="hidden" id="revPeriodType" value="8">
    </div>
    <div class="form-actions">
      <button class="btn btn-success" onclick="submitRevenueData()">提交收入数据</button>
      <button class="btn btn-outline btn-sm" onclick="clearRevForm()">清空表单</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click(); showImportHint('revenue')" style="margin-left:auto;">📥 导入Excel</button>
      <button class="btn btn-outline btn-sm" onclick="downloadTemplate('revenue')">📥 下载收入模板</button>
    </div>
  </div>
  <!-- No role selected prompt (should not appear, default role is set) -->
  <div id="card-no-role" class="card" style="display:none;">
    <h3>请选择角色</h3>
    <p style="color:var(--text2);">在右上角下拉菜单中选择"投放师"或"产品"角色后开始录入数据。</p>
  </div>
</div>

<!-- ==================== Page: History ==================== -->
<div id="page-history" class="page">
  <div class="card">
    <h3>历史数据</h3>
    <div class="tabs" style="margin-bottom:12px;">
      <button class="tab-btn" onclick="switchHistoryTab('wide')">统计宽表</button>
      <button class="tab-btn" onclick="switchHistoryTab('ads')">投放明细</button>
      <button class="tab-btn" onclick="switchHistoryTab('revenue')">收入明细</button>
    </div>
    <div class="date-range">
      <input type="text" class="range-pick" id="histRange" autocomplete="off" readonly placeholder="点击选择日期范围">
      <input type="hidden" id="histStart"><input type="hidden" id="histEnd">
      <button class="btn btn-outline btn-sm" onclick="loadHistory()">查询</button>
      <button class="btn btn-success btn-sm" id="btnExportWide" onclick="exportWideTable()" style="display:none;">导出Excel</button>
      <button class="btn btn-danger btn-sm" id="btnDeleteSelected" onclick="deleteHistory()" style="margin-left:auto;display:none;">删除选中</button>
    </div>
    <div class="table-wrap" id="historyTable" style="min-height:200px;overflow-x:auto;">
      <p style="color:var(--text2);text-align:center;padding:40px;">请选择日期范围后查询</p>
    </div>
  </div>
</div>

<!-- ==================== Page: Dashboard ==================== -->
<div id="page-dashboard" class="page">
  <!-- Dashboard Tabs -->
  <div class="tabs" style="margin-bottom:16px;">
    <button class="tab-btn active" onclick="switchDashTab('ads')" id="dashTabAds">投放ROI看板</button>
    <button class="tab-btn" onclick="switchDashTab('rev')" id="dashTabRev">收入看板</button>
    <button class="tab-btn" onclick="switchDashTab('roi')" id="dashTabRoi">ROI 汇总</button>
  </div>

  <!-- Ad ROI Dashboard -->
  <div id="dash-ads-content">
    <div class="card chart-card" style="margin-bottom:20px;">
      <h3>每日 ROI 趋势</h3>
      <div class="chart-container" style="position:relative; height:260px;">
        <canvas id="chartROI"></canvas>
      </div>
    </div>
    <div class="card">
      <h3>投放ROI 明细</h3>
      <div class="date-range" style="margin-bottom:12px;">
        <input type="text" class="range-pick" id="dashAdsRange" autocomplete="off" placeholder="点击选择日期范围">
        <input type="hidden" id="dashAdsStart"><input type="hidden" id="dashAdsEnd">
        <button class="btn btn-outline btn-sm" onclick="filterDashDate()">查询</button>
        <button class="btn btn-outline btn-sm" onclick="clearDashFilter()">显示全部</button>
        <button class="btn btn-sm" style="background:#722ed1;color:#fff;border:none;margin-left:8px;" onclick="generateDailyReport()">📊 数据汇总</button>
      </div>
      <div class="table-wrap" id="dimTable"></div>
    </div>
  </div>

  <!-- Revenue Dashboard -->
  <div id="dash-rev-content" style="display:none;">
    <div class="card chart-card" style="margin-bottom:20px;">
      <h3>多窗口 ROI 趋势</h3>
      <div class="chart-container" style="position:relative; height:260px;">
        <canvas id="chartROIRev"></canvas>
      </div>
    </div>

<script>
// ============================================================
//  TT 投放数据管理系统 - JavaScript (Supabase 云数据库版)

// ===== 0. Supabase 初始化 =====
const SUPABASE_URL = 'https://tbxxhmtqufzzhshivija.supabase.co';
const SUPABASE_KEY = 'sb_publishable_vWXg8v_JCLanAlM4nHtMtA_-5qmiJIW';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== 1. Data Store =====
let appData = { ads: [], revenues: [] };

async function loadData() {
  try {
    const [adsRes, revRes] = await Promise.all([
      supabase.from('ads').select('*').order('date', { ascending: false }),
      supabase.from('revenues').select('*').order('date', { ascending: false })
    ]);
    if (adsRes.error) throw adsRes.error;
    if (revRes.error) throw revRes.error;
    appData.ads = (adsRes.data || []).map(r => ({
      id: r.id, date: r.date, pkg: r.pkg, group: r.group, panel: r.panel,
      spend: r.spend, spendClean: r.spend_clean, revenue: r.revenue
    }));
    appData.revenues = (revRes.data || []).map(r => ({
      id: r.id, date: r.date, installDays: r.install_days,
      coin: r.coin, firstSub: r.first_sub, renewSub: r.renew_sub,
      coinRenew: r.coin_renew, total: r.total
    }));
  } catch(e) {
    console.error('加载数据失败:', e);
    appData = { ads: [], revenues: [] };
  }
}
// saveData 不再需要，每次操作直接调API
function saveData() { /* no-op: 数据已通过API持久化 */ }
// 刷新数据并更新视图
async function refreshData() {
  await loadData();
  if (currentPage === 'dashboard') renderDashboard();
  if (currentPage === 'history') loadHistory();
}

// ===== Toast =====
function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.background = ok ? 'var(--green)' : 'var(--red)';
  t.style.opacity = '1';
  t.style.animation = 'none';
  void t.offsetWidth;
  t.style.animation = 'fadeIn .3s, fadeOut .3s 2.5s forwards';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// ===== Role & Page Switching =====
let currentRole = 'product';
let currentPage = 'entry';
let historyTab = 'wide';
let revTab = 'day0';

function switchRole() {
  currentRole = document.getElementById('roleSelect').value;
  const ind = document.getElementById('roleIndicator');
  ind.textContent = currentRole === 'ads' ? '投放师' : '产品';
  ind.className = 'role-indicator ' + (currentRole === 'ads' ? 'ads' : 'product');
  updateEntryCards();
  if (currentPage === 'dashboard') renderDashboard();
  if (currentPage === 'history') loadHistory();
}

async function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  if (page === 'entry') updateEntryCards();
  if (page === 'history') loadHistory();
  if (page === 'dashboard') { window.scrollTo(0, 0); await loadData(); switchDashTab(dashTab); }
}

function switchDashTab(tab) {
  dashTab = tab;
  document.getElementById('dashTabAds').classList.toggle('active', tab === 'ads');
  document.getElementById('dashTabRev').classList.toggle('active', tab === 'rev');
  document.getElementById('dashTabRoi').classList.toggle('active', tab === 'roi');
  document.getElementById('dash-ads-content').style.display = tab === 'ads' ? 'block' : 'none';
  document.getElementById('dash-rev-content').style.display = tab === 'rev' ? 'block' : 'none';
  document.getElementById('dash-roi-content').style.display = tab === 'roi' ? 'block' : 'none';
  if (tab === 'ads') renderAdsDashboard();
  else if (tab === 'rev') renderRevenueDashboard();
  else renderROISummary();
}

function renderDashboard() {
  if (dashTab === 'ads') renderAdsDashboard();
  else renderRevenueDashboard();
}

function updateEntryCards() {
  document.getElementById('card-ads-entry').style.display = currentRole === 'ads' ? 'block' : 'none';
  document.getElementById('card-rev-entry').style.display = currentRole === 'product' ? 'block' : 'none';
  document.getElementById('card-no-role').style.display = 'none';
  if (currentRole === 'ads') setDefaultDates('adDate');
  if (currentRole === 'product') { setDefaultDates('revDate'); updateRevTabUI(); }
}

// ===== Date Helpers =====
function setDefaultDates(id) {
  const el = document.getElementById(id);
  if (!el || el.value) return;
  el.value = todayStr();
}
function todayStr() { return new Date().toISOString().slice(0, 10); }
function daysAgo(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function pct(n) {
  if (n === null || n === undefined || isNaN(n) || n === 0) return '-';
  return (Number(n) * 100).toFixed(2) + '%';
}

// ===== Ad Data Entry =====
function clearAdForm() {
  ['adDate','adPkg','adGroup','adPanel','adSpend','adSpendClean','adRevenue'].forEach(id => {
    document.getElementById(id).value = '';
  });
  setDefaultDates('adDate');
}

async function submitAdData() {
  const date = document.getElementById('adDate').value;
  const pkg = document.getElementById('adPkg').value.trim();
  const group = document.getElementById('adGroup').value.trim();
  const panel = document.getElementById('adPanel').value.trim();
  const spend = parseFloat(document.getElementById('adSpend').value) || 0;
  const spendClean = parseFloat(document.getElementById('adSpendClean').value) || 0;
  const revenue = parseFloat(document.getElementById('adRevenue').value) || 0;

  if (!date || !pkg || !group || !panel) return showToast('请填写必填字段（日期、包名、投放组、面板）', false);
  if (spend === 0 && spendClean === 0 && revenue === 0) return showToast('消耗和收入不能全为0，请填写至少一项数据', false);

  // 检查是否存在完全相同的数据（同日期+包名+投放组+面板+消耗+消耗去空耗+收入）
  const { data: existRows, error: checkErr } = await supabase.from('ads').select('id,spend,spend_clean,revenue')
    .eq('date', date).eq('pkg', pkg).eq('group', group).eq('panel', panel);
  if (checkErr) return showToast('校验失败: ' + checkErr.message, false);

  const isExactDuplicate = (existRows || []).some(r =>
    (r.spend || 0) === spend && (r.spend_clean || 0) === spendClean && (r.revenue || 0) === revenue
  );
  if (isExactDuplicate) {
    return showToast('该日期、包名、投放组、面板的数据已存在且数值完全相同，无需重复提交', false);
  }

  supabase.from('ads').insert({
    date, pkg, group, panel, spend, spend_clean: spendClean, revenue
  }).then(res => {
    if (!res.error) {
      showToast('投放数据已保存');
      clearAdForm();
      refreshData();
    } else {
      showToast('保存失败: ' + res.error.message, false);
    }
  }).catch(err => showToast('保存失败: ' + err.message, false));
}

// ===== Revenue Data Entry =====
function switchRevTab(tab) {
  revTab = tab;
  document.querySelectorAll('#card-rev-entry .tab-btn').forEach(b => {
    const days = parseInt(tab.replace('day', ''));
    const btnText = b.textContent.trim();
    const match = (days === 0 && btnText === '当日') ||
                  (days > 0 && btnText.includes(days + '日'));
    b.classList.toggle('active', match);
  });
  updateRevTabUI();
}

function updateRevTabUI() {
  const days = parseInt(revTab.replace('day', ''));
  document.getElementById('revPeriodType').value = days;

  // 当日: 金币收入 + 会员首订 + 会员续订（不显示金币续订）
  // 8/14/30/45日: 金币续订 + 会员续订（不显示金币收入和会员首订）
  const isDay0 = (days === 0);
  document.getElementById('revGroupCoin').style.display = isDay0 ? 'block' : 'none';
  document.getElementById('revGroupCoinRenew').style.display = isDay0 ? 'none' : 'block';
  document.getElementById('revGroupFirstSub').style.display = isDay0 ? 'block' : 'none';
  document.getElementById('revGroupRenewSub').style.display = 'block';

  if (!isDay0) {
    const map = { 8: '8日内', 14: '14日内', 30: '30日内', 45: '45日内' };
    document.getElementById('revRenewLabel').textContent = (map[days] || days + '日内') + '金币续订（去通道）';
    document.getElementById('revRenewSubLabel').textContent = (map[days] || days + '日内') + '会员续订（去通道）';
  } else {
    document.getElementById('revRenewSubLabel').textContent = '会员续订（去通道）';
  }
  const st = document.querySelector('#revEntryForm .form-section-title[style*="margin-top"]');
  if (st) st.textContent = '收入项目 ($) - ' + (isDay0 ? '当日' : days + '日');

function clearRevForm() {
  ['revDate','revCoin','revFirstSub','revRenewSub','revCoinRenew'].forEach(id => {
    document.getElementById(id).value = '';
  });
  setDefaultDates('revDate');
}

function submitRevenueData() {
  const date = document.getElementById('revDate').value;
  const installDays = parseInt(revTab.replace('day',''));
  const isDay0 = (installDays === 0);
  const coin = isDay0 ? (parseFloat(document.getElementById('revCoin').value) || 0) : 0;
  const coinRenew = !isDay0 ? (parseFloat(document.getElementById('revCoinRenew').value) || 0) : 0;
  const firstSub = isDay0 ? (parseFloat(document.getElementById('revFirstSub').value) || 0) : 0;
  const renewSub = parseFloat(document.getElementById('revRenewSub').value) || 0;

  if (!date) return showToast('请填写投放日期', false);
  if (coin === 0 && firstSub === 0 && renewSub === 0 && coinRenew === 0) return showToast('收入数据不能全为0，请填写至少一项数据', false);

  const total = coin + firstSub + renewSub + coinRenew;
  supabase.from('revenues').insert({
    date, install_days: installDays, coin, first_sub: firstSub,
    renew_sub: renewSub, coin_renew: coinRenew, total
  }).then(res => {
    if (!res.error) {
      showToast('收入数据已保存');
      clearRevForm();
      refreshData();
    } else {
      showToast('保存失败: ' + res.error.message, false);
    }
  }).catch(err => showToast('保存失败: ' + err.message, false));
}

// ===== History Page =====

// 宽表数据缓存，用于导出
let _wideTableData = [];

function switchHistoryTab(tab) {
  historyTab = tab;
  document.querySelectorAll('#page-history .tab-btn').forEach(b => {
    const t = b.textContent.trim();
    b.classList.toggle('active',
      (tab === 'wide' && t === '统计宽表') ||
      (tab === 'ads' && t === '投放明细') ||
      (tab === 'revenue' && t === '收入明细')
    );
  });
  // 根据 tab 显示/隐藏对应操作按钮
  const btnExport = document.getElementById('btnExportWide');
  const btnDelete = document.getElementById('btnDeleteSelected');
  if (btnExport) btnExport.style.display = tab === 'wide' ? '' : 'none';
  if (btnDelete) btnDelete.style.display = tab !== 'wide' ? '' : 'none';
  loadHistory();
}

async function loadHistory() {
  const start = document.getElementById('histStart').value;
  const end = document.getElementById('histEnd').value;
  if (!start || !end) {
    document.getElementById('historyTable').innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">请选择日期范围后查询</p>';
    return;
  }
  const container = document.getElementById('historyTable');
  container.innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">加载中...</p>';

  try {
    if (historyTab === 'wide') {
      // ---- 统计宽表（前端计算） ----
      const [adsRes, revRes] = await Promise.all([
        supabase.from('ads').select('*').gte('date', start).lte('date', end).order('date'),
        supabase.from('revenues').select('*').gte('date', start).lte('date', end).order('date')
      ]);
      if (adsRes.error) throw adsRes.error;
      if (revRes.error) throw revRes.error;
      const ads = adsRes.data || [];
      const revs = revRes.data || [];

      // 按日期聚合投放数据
      const adByDate = {};
      ads.forEach(a => {
        const d = a.date;
        if (!adByDate[d]) adByDate[d] = { spend: 0, spend_clean: 0, revenue: 0 };
        adByDate[d].spend += a.spend;
        adByDate[d].spend_clean += a.spend_clean;
        adByDate[d].revenue += a.revenue;
      });

      // 按日期+天数聚合收入数据
      const revByDate = {};
      revs.forEach(r => {
        const d = r.date;
        const days = String(r.install_days);
        if (!revByDate[d]) revByDate[d] = {};
        if (!revByDate[d][days]) revByDate[d][days] = { coin: 0, firstSub: 0, renewSub: 0, coinRenew: 0, total: 0 };
        revByDate[d][days].coin += r.coin;
        revByDate[d][days].firstSub += r.first_sub;
        revByDate[d][days].renewSub += r.renew_sub;
        revByDate[d][days].coinRenew += r.coin_renew;
        revByDate[d][days].total += r.total;
      });

      // 合并
      const allDates = [...new Set([...Object.keys(adByDate), ...Object.keys(revByDate)])].sort().reverse();
      const DAYS_LIST = ['0', '8', '14', '30', '45'];
      const DAYS_KEY = { '0': 'day0', '8': 'day8', '14': 'day14', '30': 'day30', '45': 'day45' };

      const rows = allDates.map(d => {
        const ad = adByDate[d] || { spend: 0, spend_clean: 0, revenue: 0 };
        const spend = ad.spend;
        const spendClean = ad.spend_clean;
        const revenue = ad.revenue;
        const roi = spend > 0 ? revenue / spend : null;
        const roiClean = spendClean > 0 ? revenue / spendClean : null;
        const row = { date: d, spend, spendClean, revenue, roi, roiClean };
        DAYS_LIST.forEach(days => {
          const key = DAYS_KEY[days];
          const rd = (revByDate[d] || {})[days] || {};
          if (days === '0') {
            row[key + '_coin'] = rd.coin || 0;
            row[key + '_firstSub'] = rd.firstSub || 0;
            row[key + '_renewSub'] = rd.renewSub || 0;
            row[key + '_total'] = rd.total || 0;
          } else {
            row[key + '_coinRenew'] = rd.coinRenew || 0;
            row[key + '_renewSub'] = rd.renewSub || 0;
            row[key + '_total'] = rd.total || 0;
          }
        });
        return row;
      });

      _wideTableData = rows;
      if (!rows.length) { container.innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">暂无数据</p>'; return; }
      renderWideTable(rows, container);

    } else if (historyTab === 'ads') {
      // ---- 投放明细 ----
      const res = await supabase.from('ads').select('*').gte('date', start).lte('date', end).order('date', { ascending: false });
      if (res.error) throw res.error;
      const rows = (res.data || []);
      if (!rows.length) { container.innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">暂无数据</p>'; return; }
      let html = `<table><thead><tr>
        <th><input type="checkbox" id="selectAllAds" onchange="toggleSelectAll('ads', this)"></th>
        <th>日期</th><th>包名</th><th>投放组</th><th>面板</th>
        <th class="num">消耗</th><th class="num">消耗(去空耗)</th><th class="num">收入(投放口径)</th>
        <th class="num">ROI</th><th class="num">ROI(去空耗)</th><th>操作</th></tr></thead><tbody>`;
      rows.forEach(r => {
        const roi = r.spend > 0 ? r.revenue / r.spend : 0;
        const roiClean = r.spend_clean > 0 ? r.revenue / r.spend_clean : 0;
        html += `<tr>
          <td><input type="checkbox" class="ad-cb" value="${r.id}"></td>
          <td>${r.date}</td><td>${r.pkg}</td><td>${r.group}</td><td>${r.panel}</td>
          <td class="num">${fmt(r.spend)}</td><td class="num">${fmt(r.spend_clean)}</td><td class="num">${fmt(r.revenue)}</td>
          <td class="num ${roi >= 0 ? 'roi-positive' : 'roi-negative'}">${pct(roi)}</td>
          <td class="num ${roiClean >= 0 ? 'roi-positive' : 'roi-negative'}">${pct(roiClean)}</td>
          <td><div class="row-actions">
            <button class="action-btn del" onclick="deleteAdRow(${r.id})" title="删除">✕</button>
          </div></td></tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;

    } else {
      // ---- 收入明细 ----
      const res = await supabase.from('revenues').select('*').gte('date', start).lte('date', end).order('date', { ascending: false });
      if (res.error) throw res.error;
      const rows = (res.data || []);
      if (!rows.length) { container.innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">暂无数据</p>'; return; }
      let html = `<table><thead><tr>
        <th><input type="checkbox" id="selectAllRev" onchange="toggleSelectAll('rev', this)"></th>
        <th>投放日期</th><th>核销天数</th>
        <th class="num">金币收入</th><th class="num">会员首订</th><th class="num">会员续订</th>
        <th class="num">金币续订</th><th class="num">合计</th><th>操作</th></tr></thead><tbody>`;
      rows.forEach(r => {
        html += `<tr>
          <td><input type="checkbox" class="rev-cb" value="${r.id}"></td>
          <td>${r.date}</td><td>${r.install_days}日</td>
          <td class="num">${fmt(r.coin)}</td><td class="num">${fmt(r.first_sub)}</td>
          <td class="num">${fmt(r.renew_sub)}</td><td class="num">${fmt(r.coin_renew)}</td>
          <td class="num" style="font-weight:700;">${fmt(r.total)}</td>
          <td><div class="row-actions">
            <button class="action-btn del" onclick="deleteRevRow(${r.id})" title="删除">✕</button>
          </div></td></tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }
  } catch(e) {
    container.innerHTML = '<p style="color:var(--red);text-align:center;padding:40px;">加载失败: ' + e.message + '</p>';
  }
}

// ---- 宽表渲染 ----
function renderWideTable(rows, container) {
  // 表头分组定义
  const COL_GROUPS = [
    { label: '投放数据', cols: [
      { key: 'spend',       label: '消耗',          fmt: 'money' },
      { key: 'spendClean',  label: '消耗(去空耗)',   fmt: 'money' },
      { key: 'revenue',     label: '收入(投放口径)', fmt: 'money' },
      { key: 'roi',         label: 'ROI',            fmt: 'pct'   },
      { key: 'roiClean',    label: '去空耗ROI',      fmt: 'pct'   },
    ]},
    { label: '当日收入', cols: [
      { key: 'day0_coin',     label: '金币收入', fmt: 'money' },
      { key: 'day0_firstSub', label: '会员首订', fmt: 'money' },
      { key: 'day0_renewSub', label: '会员续订', fmt: 'money' },
      { key: 'day0_total',    label: '合计',     fmt: 'money' },
    ]},
    { label: '8日收入', cols: [
      { key: 'day8_coinRenew', label: '金币续订', fmt: 'money' },
      { key: 'day8_renewSub',  label: '会员续订', fmt: 'money' },
      { key: 'day8_total',     label: '合计',     fmt: 'money' },
    ]},
    { label: '14日收入', cols: [
      { key: 'day14_coinRenew', label: '金币续订', fmt: 'money' },
      { key: 'day14_renewSub',  label: '会员续订', fmt: 'money' },
      { key: 'day14_total',     label: '合计',     fmt: 'money' },
    ]},
    { label: '30日收入', cols: [
      { key: 'day30_coinRenew', label: '金币续订', fmt: 'money' },
      { key: 'day30_renewSub',  label: '会员续订', fmt: 'money' },
      { key: 'day30_total',     label: '合计',     fmt: 'money' },
    ]},
    { label: '45日收入', cols: [
      { key: 'day45_coinRenew', label: '金币续订', fmt: 'money' },
      { key: 'day45_renewSub',  label: '会员续订', fmt: 'money' },
      { key: 'day45_total',     label: '合计',     fmt: 'money' },
    ]},
  ];

  // 宽表专用样式
  let html = `<style>
  .wide-table-wrap { overflow-x: auto; max-width: 100%; }
  .wide-table { border-collapse: collapse; font-size: 12px; white-space: nowrap; width: 100%; }
  .wide-table th, .wide-table td { border: 1px solid var(--border); padding: 5px 8px; text-align: right; }
  .wide-table th { background: #1e1e2e; color: var(--text2); font-weight: 600; position: sticky; top: 0; z-index: 2; }
  .wide-table th.group-hd { background: #252535; color: var(--accent2); text-align: center; border-bottom: 2px solid var(--accent); }
  .wide-table th.col-date { text-align: center; left: 0; z-index: 3; }
  .wide-table td.col-date { text-align: center; background: #1a1a2a; font-weight: 600; color: var(--text); position: sticky; left: 0; z-index: 1; }
  .wide-table tr:hover td { background: rgba(108,92,231,0.07); }
  .wide-table tr:hover td.col-date { background: #1e1e30; }
  .wide-table td.num-cell { color: var(--text); }
  .wide-table td.roi-pos { color: #e85656; font-weight: 600; }
  .wide-table td.roi-neg { color: var(--green); font-weight: 600; }
  .wide-table td.zero { color: var(--text2); }
  .wide-table tfoot td { background: #252535; font-weight: 700; color: var(--gold); border-top: 2px solid var(--accent); }
  </style>`;

  html += `<div class="wide-table-wrap"><table class="wide-table"><thead>`;

  // 第一行：分组表头
  html += `<tr><th class="group-hd col-date" rowspan="2">日期</th>`;
  COL_GROUPS.forEach(g => {
    html += `<th class="group-hd" colspan="${g.cols.length}">${g.label}</th>`;
  });
  html += `</tr>`;

  // 第二行：字段表头
  html += `<tr>`;
  COL_GROUPS.forEach(g => {
    g.cols.forEach(c => {
      html += `<th>${c.label}</th>`;
    });
  });
  html += `</tr></thead><tbody>`;

  // 汇总用
  const sumKeys = {};
  COL_GROUPS.forEach(g => g.cols.forEach(c => { if (c.fmt === 'money') sumKeys[c.key] = 0; }));
  let sumSpend = 0, sumSpendClean = 0, sumRevenue = 0;

  // 数据行
  rows.forEach(r => {
    html += `<tr><td class="col-date">${r.date}</td>`;
    COL_GROUPS.forEach(g => {
      g.cols.forEach(c => {
        const val = r[c.key];
        if (c.fmt === 'pct') {
          if (val === null || val === undefined) {
            html += `<td class="zero">-</td>`;
          } else {
            const pctStr = (val * 100).toFixed(2) + '%';
            const cls = val >= 1 ? 'roi-pos' : (val > 0 ? 'num-cell' : 'roi-neg');
            html += `<td class="${cls}">${pctStr}</td>`;
          }
        } else {
          const n = val || 0;
          if (sumKeys.hasOwnProperty(c.key)) sumKeys[c.key] += n;
          const cls = n === 0 ? 'zero' : 'num-cell';
          html += `<td class="${cls}">${n === 0 ? '-' : fmtN(n)}</td>`;
        }
      });
    });
    html += `</tr>`;
    sumSpend += r.spend || 0;
    sumSpendClean += r.spendClean || 0;
    sumRevenue += r.revenue || 0;
  });

  // 合计行
  const totalRoi = sumSpend > 0 ? sumRevenue / sumSpend : null;
  const totalRoiClean = sumSpendClean > 0 ? sumRevenue / sumSpendClean : null;
  html += `<tfoot><tr><td class="col-date" style="background:#252535;position:sticky;left:0;">合计</td>`;
  COL_GROUPS.forEach(g => {
    g.cols.forEach(c => {
      if (c.key === 'roi') {
        const v = totalRoi;
        html += `<td>${v !== null ? ((v*100).toFixed(2) + '%') : '-'}</td>`;
      } else if (c.key === 'roiClean') {
        const v = totalRoiClean;
        html += `<td>${v !== null ? ((v*100).toFixed(2) + '%') : '-'}</td>`;
      } else if (c.fmt === 'money') {
        const n = sumKeys[c.key] || 0;
        html += `<td>${n === 0 ? '-' : fmtN(n)}</td>`;
      } else {
        html += `<td>-</td>`;
      }
    });
  });
  html += `</tr></tfoot></table></div>`;

  container.innerHTML = html;
}

// 数字格式化（宽表用，不加$符）
function fmtN(n) {
  if (n === null || n === undefined) return '-';
  return n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ---- 导出宽表为Excel ----
function exportWideTable() {
  if (!_wideTableData.length) return showToast('暂无数据可导出', false);
  if (typeof XLSX === 'undefined') return showToast('XLSX库未加载', false);

  const headers = ['日期','消耗','消耗(去空耗)','收入(投放口径)','ROI','去空耗ROI',
    '当日_金币收入','当日_会员首订','当日_会员续订','当日_合计',
    '8日_金币续订','8日_会员续订','8日_合计',
    '14日_金币续订','14日_会员续订','14日_合计',
    '30日_金币续订','30日_会员续订','30日_合计',
    '45日_金币续订','45日_会员续订','45日_合计'];

  const dataRows = _wideTableData.map(r => [
    r.date, r.spend, r.spendClean, r.revenue,
    r.roi !== null ? +(r.roi * 100).toFixed(4) : '',
    r.roiClean !== null ? +(r.roiClean * 100).toFixed(4) : '',
    r['day0_coin'], r['day0_firstSub'], r['day0_renewSub'], r['day0_total'],
    r['day8_coinRenew'], r['day8_renewSub'], r['day8_total'],
    r['day14_coinRenew'], r['day14_renewSub'], r['day14_total'],
    r['day30_coinRenew'], r['day30_renewSub'], r['day30_total'],
    r['day45_coinRenew'], r['day45_renewSub'], r['day45_total'],
  ]);

  const ws = XLSX.utils.aoa_to_sheet([headers, ...dataRows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '统计宽表');
  const start = document.getElementById('histStart').value;
  const end = document.getElementById('histEnd').value;
  XLSX.writeFile(wb, `TT统计宽表_${start}_${end}.xlsx`);
  showToast('已导出Excel');
}

function toggleSelectAll(type, cb) {
  const sel = '.' + (type === 'ads' ? 'ad-cb' : 'rev-cb');
  document.querySelectorAll(sel).forEach(c => c.checked = cb.checked);
}

function deleteAdRow(id) { deleteRow('ads', id); }
function deleteRevRow(id) { deleteRow('revenues', id); }
function deleteRow(key, id) {
  const table = key === 'ads' ? 'ads' : 'revenues';
  supabase.from(table).delete().eq('id', id)
    .then(res => {
      if (!res.error) { showToast('已删除'); loadHistory(); }
      else showToast('删除失败: ' + res.error.message, false);
    })
    .catch(err => showToast('删除失败: ' + err.message, false));
}

function deleteHistory() {
  const type = historyTab === 'ads' ? 'ads' : 'revenues';
  const sel = historyTab === 'ads' ? '.ad-cb:checked' : '.rev-cb:checked';
  const ids = [...document.querySelectorAll(sel)].map(c => parseInt(c.value));
  if (!ids.length) return showToast('请先勾选要删除的记录', false);
  if (!confirm(`确定要删除 ${ids.length} 条记录吗？此操作不可恢复。`)) return;
  supabase.from(type).delete().in('id', ids)
    .then(res => {
      if (!res.error) { showToast('已删除 ' + ids.length + ' 条记录'); loadHistory(); }
      else showToast('删除失败: ' + res.error.message, false);
    })
    .catch(err => showToast('删除失败: ' + err.message, false));
}

// ===== Dashboard =====
let chartROI = null;
let chartROIRev = null;
let dashDateAll = false;
let dashRevDateAll = false;
let dashTab = 'ads';

// ===== 投放ROI看板 =====
function filterDashDate() {
  const start = document.getElementById('dashAdsStart').value;
  const end = document.getElementById('dashAdsEnd').value;
  dashDateAll = (!start && !end);
  renderAdsDashboard();
}

function clearDashFilter() {
  dashDateAll = true;
  resetRangePicker('dashAdsRange', 'dashAdsStart', 'dashAdsEnd');
  renderAdsDashboard();
}

function renderAdsDashboard() {
  const allAds = appData.ads;

  if (!allAds.length) {
    document.getElementById('dimTable').innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">暂无投放数据，请先录入</p>';
    destroyCharts();
    return;
  }

  // Filter ads by date range for charts
  let filteredAds = allAds;
  if (!dashDateAll) {
    const start = document.getElementById('dashAdsStart').value;
    const end = document.getElementById('dashAdsEnd').value;
    if (start && end) {
      filteredAds = allAds.filter(a => a.date >= start && a.date <= end);
    } else if (start) {
      filteredAds = allAds.filter(a => a.date >= start);
    } else if (end) {
      filteredAds = allAds.filter(a => a.date <= end);
    }
  }

  // Agg by all 4 dims: date + pkg + group + panel
  const groups = {};
  filteredAds.forEach(a => {
    const key = `${a.date}|||${a.pkg || ''}|||${a.group || ''}|||${a.panel || ''}`;
    if (!groups[key]) groups[key] = { date: a.date, pkg: a.pkg || '', group: a.group || '', panel: a.panel || '', spend: 0, spendClean: 0, revenue: 0 };
    groups[key].spend += a.spend;
    groups[key].spendClean += a.spendClean;
    groups[key].revenue += a.revenue;
  });

  let dimData = Object.values(groups).sort((a, b) => a.date.localeCompare(b.date) || a.pkg.localeCompare(b.pkg));

  // Apply date range filter
  if (!dashDateAll) {
    const start = document.getElementById('dashAdsStart').value;
    const end = document.getElementById('dashAdsEnd').value;
    if (start && end) {
      dimData = dimData.filter(d => d.date >= start && d.date <= end);
    } else if (start) {
      dimData = dimData.filter(d => d.date >= start);
    } else if (end) {
      dimData = dimData.filter(d => d.date <= end);
    }
  }

  if (!dimData.length) {
    document.getElementById('dimTable').innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">' + (dashDateAll ? '暂无数据' : '该日期范围暂无投放数据') + '</p>';
    renderCharts(filteredAds);
    return;
  }

  const tSpend = dimData.reduce((s, d) => s + d.spend, 0);
  const tSpendClean = dimData.reduce((s, d) => s + d.spendClean, 0);
  const tRevenue = dimData.reduce((s, d) => s + d.revenue, 0);
  const tROI = tSpend > 0 ? tRevenue / tSpend : 0;
  const tROIClean = tSpendClean > 0 ? tRevenue / tSpendClean : 0;

  let tableHTML = `<table><thead><tr>
    <th>日期</th><th>包名</th><th>投放组</th><th>面板</th>
    <th class="num">消耗 ($)</th><th class="num">消耗·去空耗 ($)</th>
    <th class="num">收入·投放口径 ($)</th>
    <th class="num">ROI</th><th class="num">ROI·去空耗</th></tr></thead><tbody>`;

  dimData.forEach(d => {
    const roi = d.spend > 0 ? d.revenue / d.spend : 0;
    const roiClean = d.spendClean > 0 ? d.revenue / d.spendClean : 0;
    tableHTML += `<tr>
      <td>${d.date}</td><td><strong>${d.pkg}</strong></td><td>${d.group}</td><td>${d.panel}</td>
      <td class="num">${fmt(d.spend)}</td><td class="num">${fmt(d.spendClean)}</td>
      <td class="num">${fmt(d.revenue)}</td>
      <td class="num ${roi >= 1 ? 'roi-positive' : 'roi-negative'}">${pct(roi)}</td>
      <td class="num ${roiClean >= 1 ? 'roi-positive' : 'roi-negative'}">${pct(roiClean)}</td></tr>`;
  });

  tableHTML += `<tr class="total-row">
    <td><strong>合计</strong></td><td></td><td></td><td></td>
    <td class="num">${fmt(tSpend)}</td><td class="num">${fmt(tSpendClean)}</td><td class="num">${fmt(tRevenue)}</td>
    <td class="num ${tROI >= 1 ? 'roi-positive' : 'roi-negative'}">${pct(tROI)}</td>
    <td class="num ${tROIClean >= 1 ? 'roi-positive' : 'roi-negative'}">${pct(tROIClean)}</td></tr>`;
  tableHTML += '</tbody></table>';
  document.getElementById('dimTable').innerHTML = tableHTML;

  renderCharts(filteredAds);
}

function filterDashRevDate() {

  else { dashRevDateAll = false; }

function clearDashRevFilter() {

  resetRangePicker('dashRevRange', 'dashRevStart', 'dashRevEnd');
  renderRevenueDashboard();

function renderRevenueDashboard() {
  const ads = appData.ads;
  const revs = appData.revenues;

  if (!ads.length) {
    document.getElementById('revDimTable').innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">暂无投放数据，请先录入</p>';
    destroyCharts();
    return;
  }

  // Agg daily spend from ads (sum across all groups/panels per date)
  const dailySpend = {};
  const dailySpendClean = {};
  ads.forEach(a => {
    if (!dailySpend[a.date]) { dailySpend[a.date] = 0; dailySpendClean[a.date] = 0; }
    dailySpend[a.date] += a.spend;
    dailySpendClean[a.date] += a.spendClean;
  });

  // Agg revenue by date, deduplicating identical (date, installDays) rows
  const revByDate = {};
  const revSeen = new Set();
  revs.forEach(r => {
    const dedupKey = r.date + '|' + r.installDays;
    if (revSeen.has(dedupKey)) return;
    revSeen.add(dedupKey);
    const d = r.date;
    if (!revByDate[d]) revByDate[d] = {};
    const k = 'd' + r.installDays;
    if (!revByDate[d][k]) revByDate[d][k] = { coin: 0, firstSub: 0, renewSub: 0, coinRenew: 0 };
    revByDate[d][k].coin += (r.coin || 0);
    revByDate[d][k].firstSub += (r.firstSub || 0);
    revByDate[d][k].renewSub += (r.renewSub || 0);
    revByDate[d][k].coinRenew += (r.coinRenew || 0);
  });

  // Build flat rows: one per date (merge ads + revenue by date)
  const allDates = [...new Set([...Object.keys(dailySpend), ...Object.keys(revByDate)])].sort();
  let rows = allDates.map(date => {
    const rv = revByDate[date] || {};
    const d0 = rv.d0 || {};
    const d8 = rv.d8;
    const d14 = rv.d14;
    const d30 = rv.d30;
    const d45 = rv.d45;
    const hasD8 = !!d8;
    const hasD14 = !!d14;
    const hasD30 = !!d30;
    const hasD45 = !!d45;
    const spend = dailySpend[date] || 0;
    const spendClean = dailySpendClean[date] || 0;
    const coin0 = d0.coin || 0;
    const firstSub0 = d0.firstSub || 0;
    const renewSub0 = d0.renewSub || 0;
    const renewSub8 = hasD8 ? (d8.renewSub || 0) : null;
    const coinRenew8 = hasD8 ? (d8.coinRenew || 0) : null;
    const renewSub14 = hasD14 ? (d14.renewSub || 0) : null;
    const coinRenew14 = hasD14 ? (d14.coinRenew || 0) : null;
    const renewSub30 = hasD30 ? (d30.renewSub || 0) : null;
    const coinRenew30 = hasD30 ? (d30.coinRenew || 0) : null;
    const renewSub45 = hasD45 ? (d45.renewSub || 0) : null;
    const coinRenew45 = hasD45 ? (d45.coinRenew || 0) : null;
    // Formula: (coin0 + firstSub0 + renewSub_N) / spend, null if data unavailable
    const roiCalc = (rn) => rn !== null && spend > 0 ? ((coin0 + firstSub0 + rn) / spend) : null;
    const roiCalcClean = (rn) => rn !== null && spendClean > 0 ? ((coin0 + firstSub0 + rn) / spendClean) : null;
    return { date, coin0, firstSub0, renewSub0, totalDay0: coin0 + firstSub0 + renewSub0, hasD8, hasD14, hasD30, hasD45,
      renewSub8, coinRenew8, roi8: roiCalc(renewSub8), roi8Clean: roiCalcClean(renewSub8),
      renewSub14, coinRenew14, roi14: roiCalc(renewSub14), roi14Clean: roiCalcClean(renewSub14),
      renewSub30, coinRenew30, roi30: roiCalc(renewSub30), roi30Clean: roiCalcClean(renewSub30),
      renewSub45, coinRenew45, roi45: roiCalc(renewSub45), roi45Clean: roiCalcClean(renewSub45),
      spend, spendClean };
  });

  // Apply date range filter
  if (!dashRevDateAll) {
    const start = document.getElementById('dashRevStart').value;
    const end = document.getElementById('dashRevEnd').value;
    if (start && end) {
      rows = rows.filter(r => r.date >= start && r.date <= end);
    } else if (start) {
      rows = rows.filter(r => r.date >= start);
    } else if (end) {
      rows = rows.filter(r => r.date <= end);
    }
  }

  if (!rows.length) {
    document.getElementById('revDimTable').innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">' + (dashRevDateAll ? '暂无数据' : '该日期范围暂无数据') + '</p>';
    renderRevenueCharts(rows);
    return;
  }

  // Totals — only aggregate rows that have data for each window
  const sumOr0 = (arr, fn) => { let s = 0; arr.forEach(r => { const v = fn(r); if (v !== null) s += v; }); return s; };
  const tSpend = rows.reduce((s, r) => s + r.spend, 0);
  const tSpendClean = rows.reduce((s, r) => s + r.spendClean, 0);
  const tCoin0 = rows.reduce((s, r) => s + r.coin0, 0);
  const tFirstSub0 = rows.reduce((s, r) => s + r.firstSub0, 0);
  const tRenewSub0 = rows.reduce((s, r) => s + r.renewSub0, 0);
  const tTotalDay0 = tCoin0 + tFirstSub0 + tRenewSub0;
  const tRenewSub8 = sumOr0(rows, r => r.renewSub8);
  const tCoinRenew8 = sumOr0(rows, r => r.coinRenew8);
  const tRenewSub14 = sumOr0(rows, r => r.renewSub14);
  const tCoinRenew14 = sumOr0(rows, r => r.coinRenew14);
  const tRenewSub30 = sumOr0(rows, r => r.renewSub30);
  const tCoinRenew30 = sumOr0(rows, r => r.coinRenew30);
  const tRenewSub45 = sumOr0(rows, r => r.renewSub45);
  const tCoinRenew45 = sumOr0(rows, r => r.coinRenew45);
  // Total spend for rows that have each window's data
  const tSpendD8 = sumOr0(rows, r => r.hasD8 ? r.spend : null);
  const tSpendCleanD8 = sumOr0(rows, r => r.hasD8 ? r.spendClean : null);
  const tSpendD14 = sumOr0(rows, r => r.hasD14 ? r.spend : null);
  const tSpendCleanD14 = sumOr0(rows, r => r.hasD14 ? r.spendClean : null);
  const tSpendD30 = sumOr0(rows, r => r.hasD30 ? r.spend : null);
  const tSpendCleanD30 = sumOr0(rows, r => r.hasD30 ? r.spendClean : null);
  const tSpendD45 = sumOr0(rows, r => r.hasD45 ? r.spend : null);
  const tSpendCleanD45 = sumOr0(rows, r => r.hasD45 ? r.spendClean : null);
  const tRoi8 = tSpendD8 > 0 ? ((tCoin0 + tFirstSub0 + tRenewSub8) / tSpendD8) : null;
  const tRoi8Clean = tSpendCleanD8 > 0 ? ((tCoin0 + tFirstSub0 + tRenewSub8) / tSpendCleanD8) : null;
  const tRoi14 = tSpendD14 > 0 ? ((tCoin0 + tFirstSub0 + tRenewSub14) / tSpendD14) : null;
  const tRoi14Clean = tSpendCleanD14 > 0 ? ((tCoin0 + tFirstSub0 + tRenewSub14) / tSpendCleanD14) : null;
  const tRoi30 = tSpendD30 > 0 ? ((tCoin0 + tFirstSub0 + tRenewSub30) / tSpendD30) : null;
  const tRoi30Clean = tSpendCleanD30 > 0 ? ((tCoin0 + tFirstSub0 + tRenewSub30) / tSpendCleanD30) : null;
  const tRoi45 = tSpendD45 > 0 ? ((tCoin0 + tFirstSub0 + tRenewSub45) / tSpendD45) : null;
  const tRoi45Clean = tSpendCleanD45 > 0 ? ((tCoin0 + tFirstSub0 + tRenewSub45) / tSpendCleanD45) : null;

  const cls = (v) => v !== null && v >= 1 ? 'roi-positive' : 'roi-negative';
  const fmtNull = (v) => v === null ? '-' : fmt(v);
  const pctNull = (v) => v === null ? '-' : pct(v);

  let html = `<table><thead><tr>
    <th>日期</th>
    <th class="num">金币收入<br>（去通道）</th>
    <th class="num">首订<br>（去通道）</th>
    <th class="num">续订去通道</th>
    <th class="num">收入合计</th>
    <th class="num">8日内续订<br>（去通道）</th>
    <th class="num">8日内金币复购<br>（去通道）</th>
    <th class="num">8日内日ROI</th>
    <th class="num">8日内日ROI<br>去空耗</th>
    <th class="num">14日内续订<br>（去通道）</th>
    <th class="num">14日内金币复购<br>（去通道）</th>
    <th class="num">14日内日ROI</th>
    <th class="num">14日内日ROI<br>去空耗</th>
    <th class="num">30日内续订<br>（去通道）</th>
    <th class="num">30日内金币复购<br>（去通道）</th>
    <th class="num">30日内日ROI</th>
    <th class="num">30日内日ROI<br>去空耗</th>
    <th class="num">45日内续订<br>（去通道）</th>
    <th class="num">45日内金币复购<br>（去通道）</th>
    <th class="num">45日内日ROI</th>
    <th class="num">45日内日ROI<br>去空耗</th></tr></thead><tbody>`;

  rows.forEach(r => {
    html += `<tr>
      <td>${r.date}</td>
      <td class="num">${fmt(r.coin0)}</td>
      <td class="num">${fmt(r.firstSub0)}</td>
      <td class="num">${fmt(r.renewSub0)}</td>
      <td class="num" style="font-weight:700;">${fmt(r.totalDay0)}</td>
      <td class="num">${fmtNull(r.renewSub8)}</td>
      <td class="num">${fmtNull(r.coinRenew8)}</td>

function renderROISummary() {
  const ads = appData.ads;
  const revs = appData.revenues;

  if (!ads.length || !revs.length) {
    document.getElementById('roiSummaryTable').innerHTML =
      '<p style="color:var(--text2);text-align:center;padding:40px;">暂无数据，请先录入投放或收入数据</p>';
    return;
  }

  // Aggregate daily spend from ads
  const dailySpend = {};
  const dailySpendClean = {};
  ads.forEach(a => {
    if (!dailySpend[a.date]) { dailySpend[a.date] = 0; dailySpendClean[a.date] = 0; }
    dailySpend[a.date] += (a.spend || 0);
    dailySpendClean[a.date] += (a.spendClean || 0);
  });

  // Aggregate revenue by date x installDays
  const revByDate = {};
  const revSeen = new Set();
  revs.forEach(r => {
    const dk = r.date + '|' + r.installDays;
    if (revSeen.has(dk)) return;
    revSeen.add(dk);
    const d = r.date;
    if (!revByDate[d]) revByDate[d] = {};
    const k = 'd' + r.installDays;
    if (!revByDate[d][k]) revByDate[d][k] = { coin: 0, firstSub: 0, renewSub: 0, coinRenew: 0 };
    revByDate[d][k].coin += (r.coin || 0);
    revByDate[d][k].firstSub += (r.firstSub || 0);
    revByDate[d][k].renewSub += (r.renewSub || 0);
    revByDate[d][k].coinRenew += (r.coinRenew || 0);
  });

  // Find the last date with data for each period
  let lastD0 = '', lastD8 = '', lastD14 = '', lastD30 = '', lastD45 = '';
  const allDates = Object.keys(revByDate).sort();
  allDates.forEach(d => {
    const rv = revByDate[d];
    if (rv.d0) lastD0 = d;
    if (rv.d8) lastD8 = d;
    if (rv.d14) lastD14 = d;
    if (rv.d30) lastD30 = d;
    if (rv.d45) lastD45 = d;
  });

  // Filter dates from 4.10 onwards
  const START_DATE = '2026-04-10';
  const datesFromStart = allDates.filter(d => d >= START_DATE);

  // Calculate cumulative stats per period
  function calcPeriod(installDays) {
    let spendTotal = 0, spendCleanTotal = 0;
    let coin0Total = 0, firstSub0Total = 0;
    let renewSubN = 0;

    datesFromStart.forEach(d => {
      const hasRevData = installDays === 0 ? !!revByDate[d]?.d0 : !!revByDate[d]?.['d' + installDays];
      if (!hasRevData) return;

      spendTotal += (dailySpend[d] || 0);
      spendCleanTotal += (dailySpendClean[d] || 0);

      const d0 = revByDate[d].d0 || {};
      coin0Total += (d0.coin || 0);
      firstSub0Total += (d0.firstSub || 0);

      if (installDays > 0) {
        const dn = revByDate[d]['d' + installDays] || {};
        renewSubN += (dn.renewSub || 0);
      }
    });

    // D0回收 = 金币+首订(不含续订); N日回收 = 金币+首订+N日续订
    const revenue = installDays === 0
      ? (coin0Total + firstSub0Total)
      : (coin0Total + firstSub0Total + renewSubN);
    const roi = spendTotal > 0 ? revenue / spendTotal : null;
    const roiClean = spendCleanTotal > 0 ? revenue / spendCleanTotal : null;

    return { spendTotal, spendCleanTotal, revenue, roi, roiClean,
             coin0Total, firstSub0Total, renewSubN };
  }

  const p0 = calcPeriod(0);
  const p8 = calcPeriod(8);
  const p14 = calcPeriod(14);
  const p30 = calcPeriod(30);
  const p45 = calcPeriod(45);

  const cls = (v) => v !== null && v >= 1 ? 'roi-positive' : (v !== null && v < 1 && v > 0 ? 'roi-negative' : '');
  const pctFmt = (v) => v === null ? '-' : (v * 100).toFixed(2) + '%';

  const html = `<table><thead><tr>
    <th>时间周期</th>
    <th class="num">口径<br>（会员+D0金币）</th>
    <th class="num">消耗</th>
    <th class="num">消耗（除空耗）</th>
    <th class="num">回收（去通道）</th>
    <th class="num">ROI</th>
    <th class="num">ROI（除空耗）</th></tr></thead><tbody>
    <tr>
      <td>${START_DATE}-${lastD0}<br>D0</td>
      <td class="num"></td>
      <td class="num">${fmt(p0.spendTotal)}</td>
      <td class="num">${fmt(p0.spendCleanTotal)}</td>
      <td class="num">${fmt(p0.revenue)}</td>
      <td class="num ${cls(p0.roi)}">${pctFmt(p0.roi)}</td>
      <td class="num ${cls(p0.roiClean)}">${pctFmt(p0.roiClean)}</td>
    </tr>
    <tr>
      <td>${START_DATE}-${lastD8}<br>8日内</td>
      <td class="num"></td>
      <td class="num">${fmt(p8.spendTotal)}</td>
      <td class="num">${fmt(p8.spendCleanTotal)}</td>
      <td class="num">${fmt(p8.revenue)}</td>
      <td class="num ${cls(p8.roi)}">${pctFmt(p8.roi)}</td>
      <td class="num ${cls(p8.roiClean)}">${pctFmt(p8.roiClean)}</td>
    </tr>
    <tr>
      <td>${START_DATE}-${lastD14}<br>14日内</td>
      <td class="num"></td>
      <td class="num">${fmt(p14.spendTotal)}</td>
      <td class="num">${fmt(p14.spendCleanTotal)}</td>
      <td class="num">${fmt(p14.revenue)}</td>
      <td class="num ${cls(p14.roi)}">${pctFmt(p14.roi)}</td>
      <td class="num ${cls(p14.roiClean)}">${pctFmt(p14.roiClean)}</td>
    </tr>
    <tr>
      <td>${START_DATE}-${lastD30}<br>30日内</td>
      <td class="num"></td>
      <td class="num">${fmt(p30.spendTotal)}</td>
      <td class="num">${fmt(p30.spendCleanTotal)}</td>
      <td class="num">${fmt(p30.revenue)}</td>
      <td class="num ${cls(p30.roi)}">${pctFmt(p30.roi)}</td>
      <td class="num ${cls(p30.roiClean)}">${pctFmt(p30.roiClean)}</td>
    </tr>
    <tr>
      <td>${START_DATE}-${lastD45}<br>45日内</td>
      <td class="num"></td>
      <td class="num">${fmt(p45.spendTotal)}</td>
      <td class="num">${fmt(p45.spendCleanTotal)}</td>
      <td class="num">${fmt(p45.revenue)}</td>
      <td class="num ${cls(p45.roi)}">${pctFmt(p45.roi)}</td>
      <td class="num ${cls(p45.roiClean)}">${pctFmt(p45.roiClean)}</td>
    </tr>
  </tbody></table>`;
  document.getElementById('roiSummaryTable').innerHTML = html;
}

// ===== 8. Excel Import =====
let importMode = 'ads'; // 'ads' or 'revenue'
let importData = [];
let importColumns = [];

function showImportHint(mode) { importMode = mode; }

function handleFileImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const wb = XLSX.read(evt.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
      if (!json.length) return showToast('Excel为空', false);
      parseSheetData(json);
    } catch(err) {
      showToast('文件解析失败: ' + err.message, false);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

function parseSheetData(rows) {
  const header = rows[0].map(h => String(h || '').trim());
  importColumns = header;

  const dataRows = rows.slice(1).filter(r => r.some(c => c !== undefined && c !== null && c !== ''));
  importData = [];

  if (importMode === 'ads') {
    // Map columns: 日期/包名/投放组/面板/消耗/消耗(去空耗)/收入(投放口径)
    const colMap = buildColMap(header, {
      日期: ['日期', 'date', '时间'],
      包名: ['包名', 'pkg', 'package', '应用', 'app'],
      投放组: ['投放组', 'group', '广告组', 'adgroup'],
      面板: ['面板', 'panel', '平台', '渠道'],
      消耗: ['消耗', 'spend', '花费', 'cost'],
      消耗去空耗: ['消耗去空耗', '消耗(去空耗)', '去空耗', 'spendClean', '净消耗'],
      收入投放口径: ['收入', '收入投放口径', 'revenue', '收益', '广告收入']
    });

    dataRows.forEach((row, i) => {
      const date = cellStr(row, colMap.日期);
      const pkg = cellStr(row, colMap.包名);
      const group = cellStr(row, colMap.投放组);
      const panel = cellStr(row, colMap.面板);
      const spend = cellNum(row, colMap.消耗);
      const spendClean = cellNum(row, colMap.消耗去空耗);
      const revenue = cellNum(row, colMap.收入投放口径);

      if (!date || !pkg || !group || !panel) return; // skip incomplete rows

      // Parse date from Excel serial or string
      const dateStr = parseExcelDate(row[colMap.日期]);

      importData.push({
        date: dateStr,
        pkg, group, panel, spend, spendClean, revenue
      });
    });
  } else {
    // Detect Feishu revenue format (wide format: one row per date, columns for different day-ranges)
    const isFeishuFormat = header.some(h => h.includes('金币去通道收入') || h.includes('8日内去通道收入'));

    if (isFeishuFormat) {
      // 飞书表格格式说明：
      // B=当日金币收入, C=当日首订, D=当日续订
      // E=8日会员续订, F=14日会员续订, G=30日会员续订, H=45日会员续订
      // I=8日金币续订, J=14日金币续订, K=30日金币续订, L=45日金币续订
      const colDate = 0;
      const colCoin0 = 1, colFirst0 = 2, colRenew0 = 3;
      const colRenew8 = 4, colRenew14 = 5, colRenew30 = 6, colRenew45 = 7;
      const colCoinRenew8 = 8, colCoinRenew14 = 9, colCoinRenew30 = 10, colCoinRenew45 = 11;

      dataRows.forEach(row => {
        const date = parseExcelDate(row[colDate]);
        if (!date) return;

        const coin0 = cellNum(row, colCoin0);
        const first0 = cellNum(row, colFirst0);
        const renew0 = cellNum(row, colRenew0);

        // 当日 (installDays=0): 金币+首订+续订
        importData.push({
          date, installDays: 0,
          coin: coin0, firstSub: first0, renewSub: renew0, coinRenew: 0,
          total: coin0 + first0 + renew0
        });

        // 8日: 会员续订(E列) + 金币续订(I列)
        importData.push({
          date, installDays: 8,
          coin: 0, firstSub: 0,
          renewSub: cellNum(row, colRenew8),
          coinRenew: cellNum(row, colCoinRenew8),
          total: cellNum(row, colRenew8) + cellNum(row, colCoinRenew8)
        });

        // 14日
        importData.push({
          date, installDays: 14,
          coin: 0, firstSub: 0,
          renewSub: cellNum(row, colRenew14),
          coinRenew: cellNum(row, colCoinRenew14),
          total: cellNum(row, colRenew14) + cellNum(row, colCoinRenew14)
        });

        // 30日
        importData.push({
          date, installDays: 30,
          coin: 0, firstSub: 0,
          renewSub: cellNum(row, colRenew30),
          coinRenew: cellNum(row, colCoinRenew30),
          total: cellNum(row, colRenew30) + cellNum(row, colCoinRenew30)
        });

        // 45日
        importData.push({
          date, installDays: 45,
          coin: 0, firstSub: 0,
          renewSub: cellNum(row, colRenew45),
          coinRenew: cellNum(row, colCoinRenew45),
          total: cellNum(row, colRenew45) + cellNum(row, colCoinRenew45)
        });
      });
    } else {
      // Standard revenue format: 投放日期/统计周期/金币收入/会员首订/会员续订/金币续订
      const colMapRev = buildColMap(header, {
        投放日期: ['投放日期', '核销日期', '日期', 'date', '时间'],
        统计周期: ['统计周期', '安装天数', '天数', 'installDays', 'days', '核销天数', '周期'],
        金币收入: ['金币收入', 'coin', '金币'],
        会员首订: ['会员首订', 'firstSub', '首订'],
        会员续订: ['会员续订', 'renewSub', '续订'],
        金币续订: ['金币续订', 'coinRenew', '金币续']
      });

      dataRows.forEach(row => {
        const date = parseExcelDate(row[colMapRev.投放日期]);
        const periodRaw = row[colMapRev.统计周期];
        let installDays = cellNum(row, colMapRev.统计周期) || 0;
        if (typeof periodRaw === 'string') {
          const m = periodRaw.match(/^(\d+)/);
          if (m) installDays = parseInt(m[1]);
          else if (periodRaw.includes('当日') || periodRaw === '0') installDays = 0;
        }
        const coin = cellNum(row, colMapRev.金币收入);
        const firstSub = cellNum(row, colMapRev.会员首订);
        const renewSub = cellNum(row, colMapRev.会员续订);
        const coinRenew = cellNum(row, colMapRev.金币续订);

        if (!date) return;

        importData.push({
          date, installDays, coin, firstSub, renewSub, coinRenew,
          total: coin + firstSub + renewSub + coinRenew
        });
      });
    }
  }

  if (!importData.length) {
    showToast('未识别到有效数据，请检查Excel格式', false);
    return;
  }

  showImportPreview();
}

function buildColMap(header, mapping) {
  const result = {};
  for (const [key, aliases] of Object.entries(mapping)) {
    for (let i = 0; i < header.length; i++) {
      const h = header[i].toLowerCase();
      if (aliases.some(a => h === a.toLowerCase() || h.includes(a.toLowerCase()))) {
        result[key] = i;
        break;
      }
    }
  }
  return result;
}

function cellStr(row, idx) {
  if (idx === undefined || idx === null) return '';
  const v = row[idx];
  return v === undefined || v === null ? '' : String(v).trim();
}

function cellNum(row, idx) {
  if (idx === undefined || idx === null) return 0;
  const v = row[idx];
  if (v === undefined || v === null || v === '') return 0;
  return parseFloat(v) || 0;
}

function parseExcelDate(val) {
  if (val === undefined || val === null) return '';
  // Date object
  if (val instanceof Date && !isNaN(val.getTime())) {
    return val.toISOString().slice(0, 10);
  }
  // Excel serial date number
  if (typeof val === 'number' && val > 40000 && val < 60000) {
    const d = new Date((val - 25569) * 86400 * 1000);
    return d.toISOString().slice(0, 10);
  }
  // String date
  const s = String(val).trim();
  if (/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(s)) {
    const parts = s.split(/[-\/]/);
    return `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
  }
  // Try parsing
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
  return s;
}

function showImportPreview() {
  const title = document.getElementById('importTitle');
  const preview = document.getElementById('importPreview');
  const count = document.getElementById('importCount');

  title.textContent = importMode === 'ads' ? '投放数据导入预览' : '收入数据导入预览';
  count.textContent = `共识别 ${importData.length} 条有效记录`;

  if (importMode === 'ads') {
    let html = `<table><thead><tr><th>日期</th><th>包名</th><th>投放组</th><th>面板</th><th class="num">消耗</th><th class="num">去空耗</th><th class="num">收入</th></tr></thead><tbody>`;
    importData.slice(0, 50).forEach(r => {
      html += `<tr><td>${r.date}</td><td>${r.pkg}</td><td>${r.group}</td><td>${r.panel}</td><td class="num">${fmt(r.spend)}</td><td class="num">${fmt(r.spendClean)}</td><td class="num">${fmt(r.revenue)}</td></tr>`;
    });
    if (importData.length > 50) html += `<tr><td colspan="7" style="text-align:center;color:var(--text2);">... 还有 ${importData.length - 50} 条</td></tr>`;
    html += '</tbody></table>';
    preview.innerHTML = html;
  } else {
    let html = `<table><thead><tr><th>投放日期</th><th>核销天数</th><th class="num">金币收入</th><th class="num">会员首订</th><th class="num">会员续订</th><th class="num">金币续订</th><th class="num">合计</th></tr></thead><tbody>`;
    importData.slice(0, 50).forEach(r => {
      html += `<tr><td>${r.date}</td><td>${r.installDays}日</td><td class="num">${fmt(r.coin)}</td><td class="num">${fmt(r.firstSub)}</td><td class="num">${fmt(r.renewSub)}</td><td class="num">${fmt(r.coinRenew)}</td><td class="num" style="font-weight:700;">${fmt(r.total)}</td></tr>`;
    });
    if (importData.length > 50) html += `<tr><td colspan="7" style="text-align:center;color:var(--text2);">... 还有 ${importData.length - 50} 条</td></tr>`;
    html += '</tbody></table>';
    preview.innerHTML = html;
  }

  document.getElementById('importModal').style.display = 'flex';
}

function closeImport() {
  document.getElementById('importModal').style.display = 'none';
  importData = [];
}

async function confirmImport() {
  if (!importData.length) return;

  const table = importMode === 'ads' ? 'ads' : 'revenues';

  // ===== 数据一致性校验 =====
  if (importMode === 'ads') {
    // 投放导入：检查包名、投放组、面板是否与已有数据一致
    const importPkgs = [...new Set(importData.map(r => r.pkg).filter(Boolean))];
    const importGroups = [...new Set(importData.map(r => r.group).filter(Boolean))];
    const importPanels = [...new Set(importData.map(r => r.panel).filter(Boolean))];

    const { data: existing, error: fetchErr } = await supabase.from('ads').select('pkg, "group", panel');
    if (fetchErr) { showToast('校验失败: ' + fetchErr.message, false); return; }

    const existPkgs = new Set((existing || []).map(r => r.pkg));
    const existGroups = new Set((existing || []).map(r => r.group));
    const existPanels = new Set((existing || []).map(r => r.panel));

    const badPkgs = importPkgs.filter(p => !existPkgs.has(p));
    const badGroups = importGroups.filter(g => !existGroups.has(g));
    const badPanels = importPanels.filter(p => !existPanels.has(p));

    let errs = [];
    if (badPkgs.length) errs.push('包名不一致: ' + badPkgs.join('、'));
    if (badGroups.length) errs.push('投放组不一致: ' + badGroups.join('、'));
    if (badPanels.length) errs.push('面板不一致: ' + badPanels.join('、'));

    if (errs.length) {
      showToast('以下字段与已有数据不一致，请检查后重试：\n' + errs.join('\n'), false);
      return;
    }
  } else {
    // 收入导入：检查日期是否在投放数据中存在
    const importDates = [...new Set(importData.map(r => r.date).filter(Boolean))];

    const { data: adDates, error: fetchErr } = await supabase.from('ads').select('date');
    if (fetchErr) { showToast('校验失败: ' + fetchErr.message, false); return; }

    const existDateSet = new Set((adDates || []).map(r => r.date));
    const badDates = importDates.filter(d => !existDateSet.has(d));

    if (badDates.length) {
      showToast('以下日期在投放数据中不存在，请先导入对应投放数据：\n' + badDates.join('、'), false);
      return;
    }
  }

  // 构建 payload
  const payload = importMode === 'ads'
    ? importData.map(r => ({ date: r.date, pkg: r.pkg, group: r.group, panel: r.panel, spend: r.spend, spend_clean: r.spendClean, revenue: r.revenue }))
    : importData.map(r => ({ date: r.date, install_days: r.installDays, coin: r.coin, first_sub: r.firstSub, renew_sub: r.renewSub, coin_renew: r.coinRenew, total: r.total }));

  // 检查完全相同的数据，过滤掉重复项
  let toInsert = payload;
  let skippedCount = 0;

  if (importMode === 'ads') {
    // 查询涉及的所有日期，再在内存中比对（避免 Supabase or+and 过滤器兼容性问题）
    const dates = [...new Set(payload.map(r => r.date))];
    const dateFilter = dates.length === 1 ? `date=eq.${dates[0]}` : `date=in.(${dates.join(',')})`;
    const { data: existRows } = await supabase.from('ads').select('date,pkg,group,panel,spend,spend_clean,revenue').or(dateFilter);

    // 用签名集判断完全相同
    const existSet = new Set(
      (existRows || []).map(r => `${r.date}|||${r.pkg}|||${r.group}|||${r.panel}|||${(r.spend||0)}|||${(r.spend_clean||0)}|||${(r.revenue||0)}`)
    );

    const filtered = [];
    for (const r of payload) {
      const sig = `${r.date}|||${r.pkg}|||${r.group}|||${r.panel}|||${r.spend}|||${r.spend_clean}|||${r.revenue}`;
      if (existSet.has(sig)) {
        skippedCount++;
      } else {
        filtered.push(r);
      }
    }
    toInsert = filtered;
  }

  if (!toInsert.length) {
    showToast('全部 ' + skippedCount + ' 条数据与已有数据完全相同，未导入任何新数据', false);
    return;
  }

  supabase.from(table).insert(toInsert)
    .then(res => {
      if (!res.error) {
        let msg = '成功导入 ' + toInsert.length + ' 条' + (importMode === 'ads' ? '投放' : '收入') + '数据';
        if (skippedCount > 0) msg += '（跳过 ' + skippedCount + ' 条完全相同的数据）';
        showToast(msg);
        closeImport();
        refreshData();
      } else {
        showToast('导入失败: ' + res.error.message, false);
      }
    })
    .catch(err => showToast('导入失败: ' + err.message, false));
}
