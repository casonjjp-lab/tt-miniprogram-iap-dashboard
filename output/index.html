// ===== 10. App Initialization =====
(async function() {
  // === Shared range picker helpers ===
  function syncDRP(targetId, startId, endId, picker) {
    const startStr = picker.startDate.format('YYYY-MM-DD');
    const endStr = picker.endDate.format('YYYY-MM-DD');
    document.getElementById(startId).value = startStr;
    document.getElementById(endId).value = endStr;
    // Also update the daterangepicker input display
    $('#' + targetId).data('daterangepicker').setStartDate(startStr);
    $('#' + targetId).data('daterangepicker').setEndDate(endStr);
  }

  function setRangePicker(rangeId, start, end) {
    // Update hidden inputs directly
    if (rangeId === 'dashAdsRange') { document.getElementById('dashAdsStart').value=start; document.getElementById('dashAdsEnd').value=end; }
    else if (rangeId === 'dashRevRange') { document.getElementById('dashRevStart').value=start; document.getElementById('dashRevEnd').value=end; }
    else if (rangeId === 'histRange') { document.getElementById('histStart').value=start; document.getElementById('histEnd').value=end; }
    // Update the picker display
    var dp = $('#' + rangeId).data('daterangepicker');
    if (dp) {
      var mStart = moment(start, 'YYYY-MM-DD');
      var mEnd = moment(end, 'YYYY-MM-DD');
      dp.setStartDate(mStart);
      dp.setEndDate(mEnd);
      // 强制更新输入框显示
      dp.element.val(mStart.format('YYYY-MM-DD') + ' - ' + mEnd.format('YYYY-MM-DD'));
    }
  }

  function clearRangePicker(rangeId, startId, endId) {
    var dp = $('#' + rangeId).data('daterangepicker');
    if (dp) { dp.setStartDate(moment()); dp.setEndDate(moment()); }
    document.getElementById(startId).value = '';
    document.getElementById(endId).value = '';
  }

  // Initialize daterangepicker common options
  function makeDRP(rangeId, startId, endId, onApply) {
    var $el = $('#' + rangeId);
    var isHistory = rangeId === 'histRange';
    var defaultStart = isHistory ? moment().subtract(29, 'days') : moment().subtract(1, 'days');
    var defaultEnd = isHistory ? moment() : moment().subtract(1, 'days');

    $el.daterangepicker({
      locale: {
        format: 'YYYY-MM-DD',
        applyLabel: '确定',
        cancelLabel: '取消',
        daysOfWeek: ['日', '一', '二', '三', '四', '五', '六'],
        monthNames: ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],
        firstDay: 1
      },
      ranges: {
        '今天': [moment(), moment()],
        '昨天': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
        '近7天': [moment().subtract(6, 'days'), moment()],
        '近14天': [moment().subtract(13, 'days'), moment()],
        '近30天': [moment().subtract(29, 'days'), moment()],
        '本月': [moment().startOf('month'), moment()],
        '上月': [moment().subtract(1, 'month').startOf('month'), moment().subtract(1, 'month').endOf('month')],
      },
      startDate: defaultStart,
      endDate: defaultEnd,
      alwaysShowCalendars: true,
      showCustomRangeLabel: false,
      linkedCalendars: false,
      autoUpdateInput: true,
      opens: 'center',
      parentEl: 'body',
      maxDate: moment()
    }, function(start, end) {
      // Callback fires on apply (NOT on cancel — cancel restores old dates so isSame == true)
      var s = start.format('YYYY-MM-DD');
      var e = end.format('YYYY-MM-DD');
      document.getElementById(startId).value = s;
      document.getElementById(endId).value = e;
      if (rangeId === 'dashAdsRange') { dashDateAll = false; }
      if (rangeId === 'dashRevRange') { dashRevDateAll = false; }
      if (onApply) onApply();
    });

    // Keep cancel handler to restore picker display to hidden input values
    $el.on('cancel.daterangepicker', function(ev, picker) {
      // Revert to previous hidden values
      var prevStart = document.getElementById(startId).value;
      var prevEnd = document.getElementById(endId).value;
      if (prevStart && prevEnd) {
        picker.setStartDate(prevStart);
        picker.setEndDate(prevEnd);
      }
    });
  }

  // Set default date ranges (native Date, no library dependency)
  document.getElementById('histStart').value = daysAgo(30);
  document.getElementById('histEnd').value = todayStr();
  // Dash pickers default to yesterday
  var d = new Date(); d.setDate(d.getDate() - 1);
  var yesterdayStr = d.toISOString().slice(0, 10);
  document.getElementById('dashAdsStart').value = yesterdayStr;
  document.getElementById('dashAdsEnd').value = yesterdayStr;
  document.getElementById('dashRevStart').value = yesterdayStr;
  document.getElementById('dashRevEnd').value = yesterdayStr;

  // Init entry cards based on role (must run BEFORE any library-dependent code)
  switchRole();
  setDefaultDates('adDate');
  setDefaultDates('revDate');

  // Initialize daterangepickers
  makeDRP('histRange', 'histStart', 'histEnd', function() { loadHistory(); });
  makeDRP('dashAdsRange', 'dashAdsStart', 'dashAdsEnd', function() { filterDashDate(); });
  makeDRP('dashRevRange', 'dashRevStart', 'dashRevEnd', function() { filterDashRevDate(); });

  // 初始化历史记录Tab状态（默认宽表）
  switchHistoryTab('wide');

  // 加载数据
  await loadData();

  // 根据当前页面渲染
  if (currentPage === 'dashboard') renderDashboard();
  if (currentPage === 'history') loadHistory();
  // Prevent any stray focus from scrolling the page
  setTimeout(() => window.scrollTo(0, 0), 100);
})();
</script>

<!-- 数据汇总弹框 -->
<div id="reportModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:9999;justify-content:center;align-items:center;">
  <div style="background:#fff;border-radius:12px;max-width:560px;width:90%;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="margin:0;font-size:16px;" id="reportTitle">数据汇总</h3>
      <button onclick="closeReportModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999;">✕</button>
    </div>
    <pre id="reportContent" style="white-space:pre-wrap;font-size:14px;line-height:1.6;color:#1a1a1a;background:#f7f8fa;border-radius:8px;padding:16px;max-height:55vh;overflow-y:auto;font-family:'PingFang SC','Microsoft YaHei',sans-serif;"></pre>
    <div style="margin-top:16px;text-align:right;">
      <button class="btn btn-sm" onclick="copyReport()" style="background:#1890ff;color:#fff;border:none;">📋 一键复制</button>
      <button class="btn btn-outline btn-sm" onclick="closeReportModal()" style="margin-left:8px;">关闭</button>
    </div>
  </div>
</div>

<script>
// ===== 数据汇总 =====
async function generateDailyReport() {
  const start = document.getElementById('dashAdsStart').value;
  const end = document.getElementById('dashAdsEnd').value;
  if (!start || !end) return showToast('请先选择日期范围（开始和结束日期）', false);

  const { data: adsRows, error } = await supabase.from('ads')
    .select('date,pkg,group,panel,spend,spend_clean,revenue')
    .gte('date', start).lte('date', end)
    .order('date', { ascending: true });
  if (error) return showToast('查询失败: ' + error.message, false);

  if (!adsRows || !adsRows.length) return showToast('该日期范围内没有投放数据', false);

  // 直接用 ads 表的 spend 和 revenue 计算 ROI
  function agg(rows) {
    let spend = 0, spendClean = 0, revenue = 0;
    rows.forEach(r => { spend += (r.spend || 0); spendClean += (r.spend_clean || 0); revenue += (r.revenue || 0); });
    const roi = spend > 0 ? revenue / spend : 0;
    const roiClean = spendClean > 0 ? revenue / spendClean : 0;
    return { spend, spendClean, revenue, roi, roiClean };
  }

  function panelType(panel) {
    if (!panel) return '其他';
    if (panel.includes('混合') || panel.toLowerCase().includes('bean')) return '混合';
    if (panel.includes('纯订阅') || panel.includes('订阅')) return '纯订阅';
    return '其他';
  }

  function groupAlias(g) {
    if (g === 'DB投放组') return '思佳组';
    if (g === '快应用三组') return '永伟组';
    return g;
  }

  function fmtWan(v) {
    return Math.round(v).toLocaleString();
  }

  function pct1(v) { return (v * 100).toFixed(2) + '%'; }

  const dateLabel = start === end ? `${start}` : `${start} ~ ${end}`;

  let txt = `IAP小程序\n`;
  txt += `日期：${dateLabel}\n`;

  const allAgg = agg(adsRows);
  txt += `总计：消耗${fmtWan(allAgg.spend)}，roi1 ${pct1(allAgg.roi)}\n`;

  const mixedRows = adsRows.filter(r => panelType(r.panel) === '混合');
  const subRows = adsRows.filter(r => panelType(r.panel) === '纯订阅');
  if (mixedRows.length) txt += `混合：消耗${fmtWan(agg(mixedRows).spend)}，roi1 ${pct1(agg(mixedRows).roi)}\n`;
  if (subRows.length) txt += `纯订阅：消耗${fmtWan(agg(subRows).spend)}，roi1 ${pct1(agg(subRows).roi)}\n`;

  // 按投放组+包名输出：先思佳组，再永伟组
  const groupOrder = ['DB投放组', '快应用三组'];
  const unknownGroups = new Set();
  adsRows.forEach(r => { const g = r.group || '未知'; if (!groupOrder.includes(g)) unknownGroups.add(g); });

  // 收集所有包名（按投放组分组）
  const groupPkgMap = {};
  adsRows.forEach(r => {
    const g = r.group || '未知';
    const pkg = r.pkg || '未知';
    if (!groupPkgMap[g]) groupPkgMap[g] = new Set();
    groupPkgMap[g].add(pkg);
  });

  function outputGroupPkg(txtRef, grp, pkg) {
    const rows = adsRows.filter(r => (r.group || '未知') === grp && (r.pkg || '未知') === pkg);
    const alias = groupAlias(grp);
    // 按实际面板名称分组
    const pnlMap = {};
    rows.forEach(r => {
      const p = r.panel || '未知';
      if (!pnlMap[p]) pnlMap[p] = [];
      pnlMap[p].push(r);
    });
    let out = `\n${pkg}${alias}：\n`;
    for (const pn of Object.keys(pnlMap).sort()) {
      // 面板展示名映射
      let displayName = pn;
      if (grp === '快应用三组' && pkg === 'MiniDramaBox' && pn === '混合') displayName = '混合coins';
      if (grp === 'DB投放组' && pkg === 'DramaSnacker' && pn === '混合') displayName = '混合beans';
      const a = agg(pnlMap[pn]);
      out += `• ${displayName}：消耗${fmtWan(a.spend)}，roi1 ${pct1(a.roi)}\n`;
    }
    return out;
  }

  for (const grp of groupOrder) {
    if (!groupPkgMap[grp]) continue;
    const pkgs = Array.from(groupPkgMap[grp]).sort();
    for (const pkg of pkgs) {
      txt += outputGroupPkg(txt, grp, pkg);
    }
  }
  // 未知投放组兜底
  for (const grp of Array.from(unknownGroups).sort()) {
    if (!groupPkgMap[grp]) continue;
    const pkgs = Array.from(groupPkgMap[grp]).sort();
    for (const pkg of pkgs) {
      txt += outputGroupPkg(txt, grp, pkg);
    }
  }

  document.getElementById('reportTitle').textContent = `数据汇总 ${dateLabel}`;
  document.getElementById('reportContent').textContent = txt;
  document.getElementById('reportModal').style.display = 'flex';
}

function closeReportModal() {
  document.getElementById('reportModal').style.display = 'none';
}

function copyReport() {
  const txt = document.getElementById('reportContent').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    showToast('已复制到剪贴板');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制到剪贴板');
  });
}
</script>
